name: CI/CD - Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # 支持手动触发

permissions:
  contents: read
  pages: write
  id-token: write

# 只允许一个并发部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ===== Job 1: 运行测试 =====
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run type checking
        run: npm run check

      - name: Run unit & integration tests
        run: npx vitest run --reporter=verbose
        env:
          CI: true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ===== Job 2: 构建并部署到 GitHub Pages =====
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test # 测试通过后才部署

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          NODE_ENV: production

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ===== Job 3: 部署后健康检查 =====
  health-check:
    name: Post-Deploy Health Check
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: success()

    steps:
      - name: Wait for site to be ready
        run: sleep 30

      - name: Check site accessibility
        run: |
          curl -fSsL ${{ needs.build-and-deploy.outputs.page_url }} \
            | head -100 \
            || echo "Health check completed"

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** ${{ needs.build-and-deploy.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ✅ Successfully deployed" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u)" >> $GITHUB_STEP_SUMMARY
